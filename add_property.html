<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إضافة عقار</title>

    <link rel="stylesheet" href="add.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <nav class="navbar">

        <div class="logo">
            مسكن
        </div>

        <ul class="nav-links">

            <li><a href="index.html">الرئيسية</a></li>

            <li><a href="#">العقارات</a></li>

            <li><a href="#">أضف عقار</a></li>

            <li><a href="#">تواصل معنا</a></li>

        </ul>

        <div class="auth">

            <button class="login">تسجيل الدخول</button>

        </div>

    </nav>
    <div class="container">

        <h2 class="title">إضافة عقار جديد</h2>

        <!-- STEPPER -->

        <div class="stepper">

            <div class="step active">1</div>
            <div class="step">2</div>
            <div class="step">3</div>
            <div class="step">4</div>

            <div class="progress"></div>

        </div>


        <!-- PROPERTY TYPE -->

        <h3 class="section-title">نوع العقار</h3>

        <div class="types">

            <div class="type-card active">
                <span>🏠</span>
                <p>شقة</p>
            </div>

            <div class="type-card">
                <span>🏢</span>
                <p>عمارة</p>
            </div>

            <div class="type-card">
                <span>🏡</span>
                <p>فيلا</p>
            </div>

            <div class="type-card">
                <span>🏬</span>
                <p>تجاري</p>
            </div>

            <div class="type-card">
                <span>🌍</span>
                <p>أرض</p>
            </div>

        </div>


        <!-- IMAGE UPLOAD -->

        <h3 class="section-title">صور العقار</h3>

        <div class="upload-area" id="dropArea">

            <p>اسحب الصور هنا أو اضغط للرفع</p>

            <input type="file" id="fileInput" multiple hidden>

        </div>

        <div class="preview" id="preview"></div>


        <!-- FORM -->

        <h3 class="section-title">تفاصيل العقار</h3>

        <div class="form-grid">

            <div>
                <label>السعر</label>
                <input type="number" id="price">
            </div>

            <div>
                <label>المساحة</label>
                <input type="number" id="area">
            </div>

            <div>
                <label>العملة</label>
                <select>
                    <option>دولار</option>
                    <option>ريال</option>
                    <option>جنيه</option>
                </select>
            </div>

        </div>


        <div class="form-grid">

            <div>
                <label>عدد الغرف</label>
                <input type="number">
            </div>

            <div>
                <label>عدد الحمامات</label>
                <input type="number">
            </div>

            <div>
                <label>موقف سيارات</label>
                <select>
                    <option>نعم</option>
                    <option>لا</option>
                </select>
            </div>

        </div>


        <!-- DESCRIPTION -->

        <h3 class="section-title">وصف العقار</h3>

        <textarea id="description" maxlength="500"></textarea>

        <div class="counter">
            <span id="count">0</span>/500
        </div>


        <!-- MAP -->

        <h3 class="section-title">الموقع</h3>

        <div class="map">

            <iframe src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed">
            </iframe>

        </div>


        <!-- BUTTONS -->

        <div class="buttons">

            <button class="cancel">إلغاء</button>

            <button class="submit">إضافة العقار</button>

        </div>

    </div>

    <script src="add.js"></script>

</body>

</html>
