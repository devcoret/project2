<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO.Gr - تأكيد رمز التحقق</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-layer"></div>

<div class="page-wrap">
  <div class="card">

    <a class="back-btn" href="forgot.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </a>

    <div class="icon-badge">
      <svg fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>

    <h2 class="card-title">تأكيد رمز التحقق</h2>
    <p class="card-sub">من فضلك تأكد من رمز الكود الذي تم إرساله<br>إلى الإيميل المخصص لك</p>

    <div class="otp-wrapper">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric">
    </div>

    <a class="btn-primary" href="newpass.html">تأكيد</a>

    <div class="resend-row">
      إعادة إرسال رمز التحقق &nbsp;<span class="resend-timer" id="timer">00:59</span>
    </div>

  </div>
</div>

<script>
  // OTP auto-jump
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', () => {
      if (inp.value.length === 1 && i < inputs.length - 1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
    });
  });

  // Countdown timer
  let secs = 59;
  const timerEl = document.getElementById('timer');
  const interval = setInterval(() => {
    secs--;
    if (secs < 0) { clearInterval(interval); timerEl.textContent = '00:00'; return; }
    timerEl.textContent = '00:' + String(secs).padStart(2, '0');
  }, 1000);
</script>
</body>
</html>
