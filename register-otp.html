<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO.Gr - تأكيد رمز التحقق</title>
<link rel="stylesheet" href="style.css">
<style>
  .otp-input.error {
    border-color: #EF4444 !important;
    background: #FEF2F2 !important;
    color: #EF4444 !important;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.12) !important;
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-5px); }
    40%      { transform: translateX(5px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  .error-msg {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 5px;
    color: #EF4444;
    font-size: 12.5px;
    font-weight: 600;
    margin-top: 10px;
    animation: fadeIn 0.3s ease;
  }
  .error-msg.show { display: flex; }
  .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* toggle demo bar */
  .demo-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99;
    display: flex;
    gap: 8px;
    background: rgba(15,25,35,0.85);
    backdrop-filter: blur(10px);
    padding: 8px 14px;
    border-radius: 30px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .demo-btn {
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .demo-btn.normal { background: #22C55E; color: #fff; }
  .demo-btn.err    { background: #EF4444; color: #fff; }
</style>
</head>
<body>
<div class="bg-layer"></div>

<div class="page-wrap">
  <div class="card">

    <a class="back-btn" href="register.html">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </a>

    <div class="icon-badge">
      <svg fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>

    <h2 class="card-title">تأكيد رمز التحقق</h2>
    <p class="card-sub">من فضلك تأكد من رمز الكود الذي تم إرساله<br>إلى الإيميل المخصص لك</p>

    <div class="otp-wrapper" id="otpWrapper">
      <input class="otp-input" id="o1" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="o2" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="o3" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="o4" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="o5" type="text" maxlength="1" inputmode="numeric">
      <input class="otp-input" id="o6" type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="error-msg" id="errorMsg">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      الرمز الذي ادخلته غير صحيح، حاول مرة اخرى
    </div>

    <a class="btn-primary" href="register-success.html" id="confirmBtn" style="margin-top:16px;">تاكيد</a>

    <div class="resend-row">
      اعادة ارسال رمز التحقق &nbsp;<span class="resend-timer" id="timer">00:59</span>
    </div>

  </div>
</div>

<!-- Demo toggle bar -->
<div class="demo-bar">
  <button class="demo-btn normal" onclick="setNormal()">حالة عادية</button>
  <button class="demo-btn err" onclick="setError()">حالة خطأ</button>
</div>

<script>
  const inputs = document.querySelectorAll('.otp-input');

  inputs.forEach((inp, i) => {
    inp.addEventListener('input', () => {
      clearError();
      if (inp.value.length === 1 && i < inputs.length - 1) inputs[i+1].focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
    });
  });

  // Countdown
  let secs = 59;
  const timerEl = document.getElementById('timer');
  const iv = setInterval(() => {
    secs--;
    if (secs < 0) { clearInterval(iv); timerEl.textContent = '00:00'; return; }
    timerEl.textContent = '00:' + String(secs).padStart(2,'0');
  }, 1000);

  function setError() {
    // fill with wrong values
    const vals = ['1','9','8','1','',''];
    inputs.forEach((inp, i) => {
      inp.value = vals[i];
      inp.classList.add('error');
    });
    document.getElementById('errorMsg').classList.add('show');
    // make confirm btn not navigate
    const btn = document.getElementById('confirmBtn');
    btn.removeAttribute('href');
    btn.onclick = () => setError();
  }

  function setNormal() {
    inputs.forEach(inp => { inp.value = ''; inp.classList.remove('error'); });
    document.getElementById('errorMsg').classList.remove('show');
    const btn = document.getElementById('confirmBtn');
    btn.setAttribute('href', 'register-success.html');
    btn.onclick = null;
    inputs[0].focus();
  }

  function clearError() {
    inputs.forEach(inp => inp.classList.remove('error'));
    document.getElementById('errorMsg').classList.remove('show');
  }
</script>
</body>
</html>
