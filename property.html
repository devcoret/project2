<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>تفاصيل العقار</title>

    <link rel="stylesheet" href="property.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <header>
        <nav class="navbar">

            <div class="logo">مسكن</div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">الرئيسية</a></li>

                    <li><a href="#">العقارات</a></li>

                    <li><a href="add_property.html">أضف عقار</a></li>

                    <li><a href="#">تواصل معنا</a></li>
                </ul>
            </nav>

            <button class="login">تسجيل الدخول</button>

        </nav>
        <h2>تفاصيل العقار</h2>

    </header>


    <section class="container">

        <!-- SLIDER -->

        <div class="slider">

            <img id="mainImg" src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">

            <div class="thumbs">

                <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">

                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

                <img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d">

            </div>

        </div>


        <!-- DETAILS -->

        <div class="details">

            <h1>فيلا الاندلس الفاخرة</h1>

            <p class="price">500000$</p>

            <p class="location">📍 دبي</p>

            <div class="features">

                <div>🛏 4 غرف</div>
                <div>🛁 3 حمام</div>
                <div>📐 350 م²</div>

            </div>

            <p class="desc">

                فيلا فاخرة بتصميم عصري ومسبح خاص وحديقة كبيرة
                تقع في منطقة هادئة وقريبة من الخدمات.

            </p>

        </div>

    </section>


    <!-- MAP -->

    <section class="map">

        <h2>الموقع</h2>

        <iframe src="https://maps.google.com/maps?q=dubai&t=&z=13&ie=UTF8&iwloc=&output=embed">
        </iframe>

    </section>


    <!-- CONTACT -->

    <section class="contact">

        <h2>تواصل مع المالك</h2>

        <input placeholder="اسمك">

        <input placeholder="رقم الهاتف">

        <textarea placeholder="رسالتك"></textarea>

        <button>إرسال</button>

    </section>

</body>

</html>
